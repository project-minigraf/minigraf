name: Nightly Benchmarks (Heavy)

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC nightly
  workflow_dispatch:       # allow manual runs

permissions:
  contents: read
  issues: write

jobs:
  benchmark-insert:
    name: Run heavy benchmarks (insert)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run benchmarks (insert)
        run: |
          set -o pipefail
          (
            CARGO_TERM_COLOR=never cargo bench -- insert
          ) 2>&1 | tee bench_insert.txt

      - name: Install Bencher CLI
        uses: bencherdev/bencher@v0.4.25

      - name: Upload to Bencher
        id: bencher
        run: |
          bencher run \
            --project minigraf \
            --token "${{ secrets.BENCHER_API_TOKEN }}" \
            --branch main \
            --testbed ubuntu-latest \
            --threshold-measure latency \
            --threshold-test t_test \
            --threshold-upper-boundary 0.99 \
            --err \
            --adapter rust_criterion \
            --file bench_insert.txt

