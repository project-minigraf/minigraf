[package]
name = "minigraf"
version = "0.1.0"
edition = "2021"
description = "A tiny, portable GQL (Graph Query Language) engine"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }

[profile.release]
panic = "abort"

