language = "C"
include_guard = "MINIGRAF_H"
autogen_warning = "/* DO NOT EDIT — generated by cbindgen. Run `cbindgen --config minigraf-c/cbindgen.toml --crate minigraf-c --output minigraf-c/include/minigraf.h` to regenerate. */"
documentation = true
documentation_style = "c99"

[export]
include = [
    "minigraf_open",
    "minigraf_open_in_memory",
    "minigraf_close",
    "minigraf_execute",
    "minigraf_string_free",
    "minigraf_checkpoint",
    "minigraf_last_error",
    "MiniGrafDb",
]
